<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — Saltire Soft Play</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..700&family=Outfit:wght@300;400;500;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    :root {
      --navy:      #024C97;
      --navy-deep: #013265;
      --navy-ink:  #061A38;
      --cream:     #FFF6E6;
      --yellow:    #FFC53D;
      --ink:       #0A1A2F;
      --ink-soft:  #3B4A60;
      --ink-mute:  #6B7A91;
      --red:       #E63946;
      --r-md:      22px;
      --r-lg:      32px;
      --r-pill:    999px;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--navy-ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--cream);
      border-radius: var(--r-lg);
      padding: clamp(2rem, 5vw, 3rem);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px -24px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .logo-cross {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-mute);
      margin-top: -0.15rem;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--navy-ink);
      margin: 0 0 0.4rem;
      line-height: 1.15;
    }

    .subtitle {
      color: var(--ink-soft);
      font-size: 0.95rem;
      margin: 0 0 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #D9E4F0;
      border-radius: var(--r-md);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: var(--navy-ink);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    input:focus {
      border-color: var(--navy);
    }

    input::placeholder {
      color: var(--ink-mute);
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--yellow);
      color: var(--navy-ink);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--r-pill);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary:hover { background: #ffb800; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: #FEE8E9;
      border: 1.5px solid var(--red);
      border-radius: var(--r-md);
      color: #B71C1C;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--ink-mute);
    }

    .footer-link a {
      color: var(--navy);
      font-weight: 600;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(10,26,47,0.25);
      border-top-color: var(--navy-ink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">

  <a href="/" class="logo">
    <svg class="logo-cross" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="2" y1="2" x2="30" y2="30" stroke="#024C97" stroke-width="5" stroke-linecap="round"/>
      <line x1="30" y1="2" x2="2" y2="30" stroke="#024C97" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="logo-text">SALTIRE</div>
      <div class="logo-sub">soft play</div>
    </div>
  </a>

  <h1>Welcome back</h1>
  <p class="subtitle">Log in to see your loyalty stamps &amp; bookings.</p>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" novalidate>
    <label for="phone">Mobile number</label>
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="+44 7700 900000"
      autocomplete="tel"
      inputmode="tel"
      required
    />

    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="••••••••"
      autocomplete="current-password"
      required
    />

    <button type="submit" class="btn-primary" id="submitBtn">
      <span id="btnText">Log in</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <div class="footer-link">
    Not a member yet? <a href="/join/">Join the loyalty card</a>
  </div>

</div>

<script>
  const form      = document.getElementById('loginForm');
  const errorMsg  = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const btnText   = document.getElementById('btnText');
  const spinner   = document.getElementById('spinner');

  function setLoading(loading) {
    submitBtn.disabled = loading;
    btnText.textContent = loading ? 'Logging in…' : 'Log in';
    spinner.style.display = loading ? 'block' : 'none';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function clearError() {
    errorMsg.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    setLoading(true);

    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body:        JSON.stringify({ phone, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Login failed');
        return;
      }

      // Redirect to dashboard
      window.location.href = '/portal/dashboard.html';

    } catch {
      showError('Connection error — please try again');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
